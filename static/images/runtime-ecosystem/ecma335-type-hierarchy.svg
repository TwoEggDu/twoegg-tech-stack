<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF4EB"/>
      <stop offset="1" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#5D645F"/>
    </marker>
    <style>
      .title { font: 700 30px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .subtitle { font: 600 14px "IBM Plex Sans", "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #7F3420; }
      .label { font: 700 18px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .copy { font: 400 14px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .caption { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .tag { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .box { stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-a { fill: #FBE8D9; }
      .box-b { fill: #E5F1EE; }
      .box-c { fill: #E8EEF7; }
      .line { stroke: #5D645F; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .line-plain { stroke: #5D645F; stroke-width: 2.5; fill: none; }
      .band { fill: rgba(255,255,255,0.35); stroke: rgba(20,33,31,0.08); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <text x="64" y="52" class="subtitle">ECMA-335 TYPE HIERARCHY</text>
  <text x="64" y="88" class="title">CLI 类型分类体系</text>

  <!-- Root node: System.Object -->
  <rect x="480" y="110" width="240" height="42" rx="14" class="box box-a"/>
  <text x="536" y="137" class="label">System.Object</text>

  <!-- Vertical trunk lines from root -->
  <path d="M600 152V180" class="line-plain"/>
  <!-- Horizontal spread bar -->
  <path d="M200 180H1000" class="line-plain"/>
  <!-- Vertical drops to branches -->
  <path d="M200 180V210" class="line-plain"/>
  <path d="M600 180V210" class="line-plain"/>
  <path d="M1000 180V210" class="line-plain"/>

  <!-- Branch 1: Reference types (box-b) -->
  <rect x="40" y="196" width="1120" height="74" rx="22" class="band"/>
  <rect x="108" y="210" width="184" height="38" rx="14" class="box box-b"/>
  <text x="148" y="235" class="label">引用类型</text>

  <path d="M292 229H340" class="line"/>
  <rect x="340" y="214" width="100" height="30" rx="12" class="box box-b"/>
  <text x="370" y="234" class="tag">class</text>

  <path d="M440 229H470" class="line"/>
  <rect x="470" y="214" width="120" height="30" rx="12" class="box box-b"/>
  <text x="494" y="234" class="tag">interface</text>

  <path d="M590 229H620" class="line"/>
  <rect x="620" y="214" width="120" height="30" rx="12" class="box box-b"/>
  <text x="643" y="234" class="tag">delegate</text>

  <path d="M740 229H770" class="line"/>
  <rect x="770" y="214" width="100" height="30" rx="12" class="box box-b"/>
  <text x="798" y="234" class="tag">array</text>

  <path d="M870 229H900" class="line"/>
  <rect x="900" y="214" width="100" height="30" rx="12" class="box box-b"/>
  <text x="927" y="234" class="tag">string</text>

  <!-- Branch 2: Value types (box-c) -->
  <rect x="40" y="284" width="1120" height="74" rx="22" class="band"/>
  <rect x="420" y="298" width="360" height="38" rx="14" class="box box-c"/>
  <text x="470" y="323" class="label">System.ValueType</text>

  <path d="M780 317H830" class="line"/>
  <rect x="830" y="302" width="100" height="30" rx="12" class="box box-c"/>
  <text x="858" y="322" class="tag">struct</text>

  <path d="M930 317H960" class="line"/>
  <rect x="960" y="302" width="90" height="30" rx="12" class="box box-c"/>
  <text x="987" y="322" class="tag">enum</text>

  <rect x="66" y="302" width="340" height="30" rx="12" class="box box-c"/>
  <text x="90" y="322" class="tag">primitive (int, float, bool...)</text>
  <path d="M406 317H420" class="line"/>

  <!-- Branch 3: Pointer types (box-a) -->
  <rect x="40" y="372" width="550" height="40" rx="16" class="band"/>
  <rect x="66" y="378" width="170" height="30" rx="14" class="box box-a"/>
  <text x="100" y="398" class="label">指针类型</text>

  <path d="M236 393H280" class="line"/>
  <rect x="280" y="378" width="280" height="30" rx="12" class="box box-a"/>
  <text x="300" y="398" class="tag">managed ref (ref) | pointer (*)</text>

  <!-- Vertical arrow from root to branch 2 -->
  <path d="M600 270V298" class="line"/>

  <!-- Caption -->
  <text x="64" y="412" class="caption">值类型继承 ValueType 但内存布局完全不同——无对象头、直接嵌入容器、赋值复制内容。</text>
</svg>