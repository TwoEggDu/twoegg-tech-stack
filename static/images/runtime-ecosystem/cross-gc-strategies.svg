<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF4EB"/>
      <stop offset="1" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#5D645F"/>
    </marker>
    <style>
      .title { font: 700 28px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .subtitle { font: 600 13px "IBM Plex Sans", "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #7F3420; }
      .label { font: 700 16px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .copy { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .caption { font: 400 12px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .box { stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-a { fill: #FBE8D9; }
      .box-b { fill: #E5F1EE; }
      .box-c { fill: #E8EEF7; }
      .line { stroke: #5D645F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <text x="64" y="44" class="subtitle">PRECISE VS CONSERVATIVE VS COOPERATIVE</text>
  <text x="64" y="78" class="title">5 种 GC 策略对比</text>

  <!-- Column 1: CoreCLR (box-b) -->
  <rect x="40" y="110" width="200" height="44" rx="10" class="box box-b"/>
  <text x="140" y="138" class="label" text-anchor="middle">CoreCLR</text>
  <line x1="140" y1="154" x2="140" y2="178" class="line"/>
  <rect x="40" y="182" width="200" height="44" rx="10" class="box box-b"/>
  <text x="140" y="210" class="label" text-anchor="middle">分代精确式</text>
  <line x1="140" y1="226" x2="140" y2="250" class="line"/>
  <rect x="40" y="254" width="200" height="44" rx="10" class="box box-b"/>
  <text x="140" y="282" class="label" text-anchor="middle">3代+LOH+POH</text>

  <!-- Column 2: Mono SGen (box-b) -->
  <rect x="270" y="110" width="200" height="44" rx="10" class="box box-b"/>
  <text x="370" y="138" class="label" text-anchor="middle">Mono SGen</text>
  <line x1="370" y1="154" x2="370" y2="178" class="line"/>
  <rect x="270" y="182" width="200" height="44" rx="10" class="box box-b"/>
  <text x="370" y="210" class="label" text-anchor="middle">精确式分代</text>
  <line x1="370" y1="226" x2="370" y2="250" class="line"/>
  <rect x="270" y="254" width="200" height="44" rx="10" class="box box-b"/>
  <text x="370" y="282" class="label" text-anchor="middle">nursery+major</text>

  <!-- Column 3: IL2CPP BoehmGC (box-a) -->
  <rect x="500" y="110" width="200" height="44" rx="10" class="box box-a"/>
  <text x="600" y="138" class="label" text-anchor="middle">IL2CPP BoehmGC</text>
  <line x1="600" y1="154" x2="600" y2="178" class="line"/>
  <rect x="500" y="182" width="200" height="44" rx="10" class="box box-a"/>
  <text x="600" y="210" class="label" text-anchor="middle">保守式非分代</text>
  <line x1="600" y1="226" x2="600" y2="250" class="line"/>
  <rect x="500" y="254" width="200" height="44" rx="10" class="box box-a"/>
  <text x="600" y="282" class="label" text-anchor="middle">mark-sweep</text>

  <!-- Column 4: HybridCLR (box-a) -->
  <rect x="730" y="110" width="200" height="44" rx="10" class="box box-a"/>
  <text x="830" y="138" class="label" text-anchor="middle">HybridCLR</text>
  <line x1="830" y1="154" x2="830" y2="178" class="line"/>
  <rect x="730" y="182" width="200" height="44" rx="10" class="box box-a"/>
  <text x="830" y="210" class="label" text-anchor="middle">复用 BoehmGC</text>
  <line x1="830" y1="226" x2="830" y2="250" class="line"/>
  <rect x="730" y="254" width="200" height="44" rx="10" class="box box-a"/>
  <text x="830" y="282" class="label" text-anchor="middle">+WriteBarrier</text>

  <!-- Column 5: LeanCLR (box-c) -->
  <rect x="960" y="110" width="200" height="44" rx="10" class="box box-c"/>
  <text x="1060" y="138" class="label" text-anchor="middle">LeanCLR</text>
  <line x1="1060" y1="154" x2="1060" y2="178" class="line"/>
  <rect x="960" y="182" width="200" height="44" rx="10" class="box box-c"/>
  <text x="1060" y="210" class="label" text-anchor="middle">stub (设计中)</text>
  <line x1="1060" y1="226" x2="1060" y2="250" class="line"/>
  <rect x="960" y="254" width="200" height="44" rx="10" class="box box-c"/>
  <text x="1060" y="282" class="label" text-anchor="middle">精确协作式</text>

  <!-- Caption -->
  <text x="600" y="350" class="caption" text-anchor="middle">精确度从高到低：CoreCLR/SGen > LeanCLR(设计) > BoehmGC。每种策略都是特定约束下的最优解。</text>
</svg>