<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF4EB"/>
      <stop offset="1" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#5D645F"/>
    </marker>
    <style>
      .title { font: 700 30px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .subtitle { font: 600 14px "IBM Plex Sans", "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #7F3420; }
      .label { font: 700 18px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .copy { font: 400 14px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .caption { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .tag { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .item { font: 400 15px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .arrow-label { font: 600 14px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #5D645F; }
      .small-label { font: 700 15px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .box { stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-a { fill: #FBE8D9; }
      .box-b { fill: #E5F1EE; }
      .box-c { fill: #E8EEF7; }
      .line { stroke: #5D645F; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .line-plain { stroke: #5D645F; stroke-width: 2.5; fill: none; }
      .band { fill: rgba(255,255,255,0.35); stroke: rgba(20,33,31,0.08); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1200" height="400" rx="28" fill="url(#bg)"/>
  <text x="64" y="52" class="subtitle">TYPE DESCRIPTOR DATA SEPARATION</text>
  <text x="64" y="88" class="title">MethodTable + EEClass Hot/Cold 分离</text>

  <!-- Left box: MethodTable (hot path) -->
  <rect x="60" y="114" width="400" height="200" rx="18" class="box box-b"/>
  <text x="80" y="145" class="label">MethodTable（热路径）</text>
  <line x1="80" y1="155" x2="440" y2="155" stroke="rgba(20,33,31,0.1)" stroke-width="1"/>
  <text x="100" y="180" class="item">vtable slots</text>
  <text x="100" y="206" class="item">interface map</text>
  <text x="100" y="232" class="item">GC descriptor</text>
  <text x="100" y="258" class="item">BaseSize</text>
  <text x="100" y="284" class="item">Flags</text>

  <!-- Right box: EEClass (cold path) -->
  <rect x="680" y="114" width="400" height="200" rx="18" class="box box-c"/>
  <text x="700" y="145" class="label">EEClass（冷路径）</text>
  <line x1="700" y1="155" x2="1060" y2="155" stroke="rgba(20,33,31,0.1)" stroke-width="1"/>
  <text x="720" y="180" class="item">FieldDescs</text>
  <text x="720" y="206" class="item">MethodDescs</text>
  <text x="720" y="232" class="item">Reflection info</text>
  <text x="720" y="258" class="item">Custom attributes</text>

  <!-- Arrow between boxes -->
  <path d="M460 214H680" class="line"/>
  <text x="502" y="206" class="arrow-label">m_pEEClass 指针</text>

  <!-- Bottom: IL2CPP contrast -->
  <rect x="60" y="336" width="380" height="38" rx="14" class="box box-a"/>
  <text x="80" y="361" class="small-label">IL2CPP: Il2CppClass（全混在一起）</text>

  <!-- Caption -->
  <text x="64" y="396" class="caption">CoreCLR 把频繁访问的数据（vtable、GC info）放在 MethodTable，不频繁的（字段列表、反射）放在 EEClass。IL2CPP 的 Il2CppClass 没有这种分离。</text>
</svg>