<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF4EB"/>
      <stop offset="100%" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#5D645F"/>
    </marker>
    <style>
      text { font-family: "IBM Plex Sans", "Segoe UI", sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="28" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#7F3420" font-weight="600" font-size="14" letter-spacing="1.5">FROM C# TO NATIVE BINARY</text>
  <text x="600" y="72" text-anchor="middle" fill="#14211F" font-weight="700" font-size="30">IL2CPP 完整管线</text>

  <!-- Band -->
  <rect x="32" y="95" width="1136" height="220" rx="22" fill="rgba(255,255,255,0.35)" stroke="rgba(20,33,31,0.08)" stroke-width="1.5"/>

  <!-- Stage 1 (box-a) -->
  <rect x="52" y="120" width="185" height="100" rx="14" fill="#FBE8D9" stroke="rgba(20,33,31,0.12)" stroke-width="1.5"/>
  <text x="144" y="155" text-anchor="middle" fill="#14211F" font-weight="700" font-size="18">C# → IL</text>
  <text x="144" y="180" text-anchor="middle" fill="#596563" font-weight="400" font-size="14">Roslyn 编译</text>
  <text x="144" y="240" text-anchor="middle" fill="#596563" font-weight="400" font-size="13">Stage 1</text>

  <!-- Arrow 1→2 -->
  <line x1="237" y1="170" x2="272" y2="170" stroke="#5D645F" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Stage 2 (box-a) -->
  <rect x="280" y="120" width="185" height="100" rx="14" fill="#FBE8D9" stroke="rgba(20,33,31,0.12)" stroke-width="1.5"/>
  <text x="372" y="155" text-anchor="middle" fill="#14211F" font-weight="700" font-size="18">IL → Stripped IL</text>
  <text x="372" y="180" text-anchor="middle" fill="#596563" font-weight="400" font-size="14">UnityLinker 裁剪</text>
  <text x="372" y="240" text-anchor="middle" fill="#596563" font-weight="400" font-size="13">Stage 2</text>

  <!-- Arrow 2→3 -->
  <line x1="465" y1="170" x2="500" y2="170" stroke="#5D645F" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Stage 3 (box-b) -->
  <rect x="508" y="120" width="185" height="100" rx="14" fill="#E5F1EE" stroke="rgba(20,33,31,0.12)" stroke-width="1.5"/>
  <text x="600" y="150" text-anchor="middle" fill="#14211F" font-weight="700" font-size="17">Stripped IL → C++</text>
  <text x="600" y="180" text-anchor="middle" fill="#596563" font-weight="400" font-size="14">il2cpp.exe 转换</text>
  <text x="600" y="240" text-anchor="middle" fill="#596563" font-weight="400" font-size="13">Stage 3 (核心)</text>

  <!-- Arrow 3→4 -->
  <line x1="693" y1="170" x2="728" y2="170" stroke="#5D645F" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Stage 4 (box-b) -->
  <rect x="736" y="120" width="185" height="100" rx="14" fill="#E5F1EE" stroke="rgba(20,33,31,0.12)" stroke-width="1.5"/>
  <text x="828" y="155" text-anchor="middle" fill="#14211F" font-weight="700" font-size="18">C++ → native</text>
  <text x="828" y="180" text-anchor="middle" fill="#596563" font-weight="400" font-size="14">平台编译器</text>
  <text x="828" y="240" text-anchor="middle" fill="#596563" font-weight="400" font-size="13">Stage 4</text>

  <!-- Arrow 4→5 -->
  <line x1="921" y1="170" x2="956" y2="170" stroke="#5D645F" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Stage 5 (box-c) -->
  <rect x="964" y="120" width="185" height="100" rx="14" fill="#E8EEF7" stroke="rgba(20,33,31,0.12)" stroke-width="1.5"/>
  <text x="1056" y="150" text-anchor="middle" fill="#14211F" font-weight="700" font-size="18">最终包</text>
  <text x="1056" y="172" text-anchor="middle" fill="#596563" font-weight="400" font-size="13">GameAssembly</text>
  <text x="1056" y="189" text-anchor="middle" fill="#596563" font-weight="400" font-size="13">+ libil2cpp</text>
  <text x="1056" y="206" text-anchor="middle" fill="#596563" font-weight="400" font-size="13">+ metadata</text>
  <text x="1056" y="240" text-anchor="middle" fill="#596563" font-weight="400" font-size="13">Stage 5</text>

  <!-- Caption -->
  <text x="600" y="360" text-anchor="middle" fill="#596563" font-weight="400" font-size="13">5 个阶段中，Stage 3 是 IL2CPP 的核心——把 .NET IL 转换成等价的 C++ 代码。</text>
</svg>
