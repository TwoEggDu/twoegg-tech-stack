<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="450" viewBox="0 0 1200 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF4EB"/>
      <stop offset="100%" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#5D645F"/>
    </marker>
    <style>
      text { font-family: "IBM Plex Sans", "Segoe UI", sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" rx="28" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" fill="#7F3420" font-weight="600" font-size="14" letter-spacing="1.5">MSIL → HL-IL → LL-IL</text>
  <text x="600" y="68" text-anchor="middle" fill="#14211F" font-weight="700" font-size="30">LeanCLR 三级 Transform</text>

  <!-- Band 1: 输入 -->
  <rect x="32" y="90" width="1136" height="90" rx="22" fill="rgba(255,255,255,0.35)" stroke="rgba(20,33,31,0.08)" stroke-width="1.5"/>
  <text x="62" y="118" fill="#596563" font-weight="600" font-size="13">输入</text>
  <rect x="110" y="102" width="990" height="62" rx="14" fill="#FBE8D9" stroke="rgba(20,33,31,0.12)" stroke-width="1.5"/>
  <text x="605" y="130" text-anchor="middle" fill="#14211F" font-weight="700" font-size="18">MSIL (256 opcodes)</text>
  <text x="605" y="152" text-anchor="middle" fill="#596563" font-weight="400" font-size="14">标准 CIL 栈机指令</text>

  <!-- Arrow Band1 → Band2 -->
  <line x1="600" y1="180" x2="600" y2="202" stroke="#5D645F" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Band 2: 第一级 Transform -->
  <rect x="32" y="210" width="1136" height="90" rx="22" fill="rgba(255,255,255,0.35)" stroke="rgba(20,33,31,0.08)" stroke-width="1.5"/>
  <text x="62" y="238" fill="#596563" font-weight="600" font-size="13">第一级</text>
  <rect x="110" y="222" width="990" height="62" rx="14" fill="#E5F1EE" stroke="rgba(20,33,31,0.12)" stroke-width="1.5"/>
  <text x="605" y="248" text-anchor="middle" fill="#14211F" font-weight="700" font-size="18">HL-IL (182 opcodes)</text>
  <text x="605" y="270" text-anchor="middle" fill="#596563" font-weight="400" font-size="14">BasicBlockSplitter + HL Transformer</text>
  <!-- Sub-items for Band 2 -->
  <text x="605" y="292" text-anchor="middle" fill="#596563" font-weight="400" font-size="13">栈模拟 &middot; 冗余消除 &middot; 基本块对齐</text>

  <!-- Arrow Band2 → Band3 -->
  <line x1="600" y1="300" x2="600" y2="322" stroke="#5D645F" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Band 3: 第二级 Transform -->
  <rect x="32" y="330" width="1136" height="90" rx="22" fill="rgba(255,255,255,0.35)" stroke="rgba(20,33,31,0.08)" stroke-width="1.5"/>
  <text x="62" y="358" fill="#596563" font-weight="600" font-size="13">第二级</text>
  <rect x="110" y="342" width="990" height="62" rx="14" fill="#E8EEF7" stroke="rgba(20,33,31,0.12)" stroke-width="1.5"/>
  <text x="605" y="368" text-anchor="middle" fill="#14211F" font-weight="700" font-size="18">LL-IL (298 opcodes)</text>
  <text x="605" y="390" text-anchor="middle" fill="#596563" font-weight="400" font-size="14">LL Transformer → Interpreter::execute</text>
  <!-- Sub-items for Band 3 -->
  <text x="605" y="412" text-anchor="middle" fill="#596563" font-weight="400" font-size="13">类型特化 &middot; 索引烘焙 &middot; 指令选择</text>

  <!-- Caption -->
  <text x="600" y="440" text-anchor="middle" fill="#596563" font-weight="400" font-size="13">与 HybridCLR 的单级 HiOpcode(1000+) 对比，LeanCLR 选择分层渐进：每层只做一类变换。</text>
</svg>
