<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF4EB"/>
      <stop offset="1" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#5D645F"/>
    </marker>
    <style>
      .title { font: 700 28px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .subtitle { font: 600 13px "IBM Plex Sans", "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #7F3420; }
      .line-label { font: 700 15px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #7F3420; }
      .label { font: 700 16px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .copy { font: 400 12px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .caption { font: 400 12px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .box { stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-a { fill: #FBE8D9; }
      .box-b { fill: #E5F1EE; }
      .box-c { fill: #E8EEF7; }
      .box-root { fill: #FFFBF4; stroke: rgba(20,33,31,0.18); stroke-width: 2; }
      .line { stroke: #5D645F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .band { fill: rgba(255,255,255,0.35); stroke: rgba(20,33,31,0.06); stroke-width: 1; }
      .divider { stroke: rgba(20,33,31,0.08); stroke-width: 1; stroke-dasharray: 6,4; }
    </style>
  </defs>

  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>

  <text x="60" y="48" class="subtitle">EIGHT READING PATHS</text>
  <text x="60" y="82" class="title">八条阅读线</text>

  <!-- ECMA-335 Root -->
  <rect x="440" y="110" width="320" height="52" rx="18" class="box box-root"/>
  <text x="500" y="138" class="label">ECMA-335 基础层</text>
  <text x="520" y="153" class="copy">8 篇 · 所有线的公共入口</text>

  <!-- 从 ECMA 向下的连接线 -->
  <path d="M600 162V190" class="line"/>

  <!-- 分隔线 -->
  <line x1="60" y1="195" x2="1140" y2="195" class="divider"/>

  <!-- ===== 线 1: Unity 工程师 ===== -->
  <rect x="56" y="208" width="1088" height="72" rx="16" class="band"/>
  <text x="80" y="237" class="line-label">线 1：Unity 工程师</text>
  <text x="80" y="255" class="copy">做热更新的人</text>

  <rect x="360" y="218" width="130" height="48" rx="14" class="box box-b"/>
  <text x="386" y="244" class="label">IL2CPP</text>
  <text x="400" y="259" class="copy">8 篇</text>

  <path d="M490 242H530" class="line"/>

  <rect x="540" y="218" width="170" height="48" rx="14" class="box box-b"/>
  <text x="568" y="244" class="label">HybridCLR</text>
  <text x="590" y="259" class="copy">37 篇</text>

  <!-- ===== 线 2: Runtime 工程师 ===== -->
  <rect x="56" y="296" width="1088" height="72" rx="16" class="band"/>
  <text x="80" y="325" class="line-label">线 2：Runtime 工程师</text>
  <text x="80" y="343" class="copy">想理解 CLR 实现的人</text>

  <rect x="360" y="306" width="130" height="48" rx="14" class="box box-c"/>
  <text x="380" y="332" class="label">CoreCLR</text>
  <text x="397" y="347" class="copy">10 篇</text>

  <path d="M490 330H530" class="line"/>

  <rect x="540" y="306" width="110" height="48" rx="14" class="box box-c"/>
  <text x="567" y="332" class="label">Mono</text>
  <text x="575" y="347" class="copy">8 篇</text>

  <path d="M650 330H690" class="line"/>

  <rect x="700" y="306" width="140" height="48" rx="14" class="box box-c"/>
  <text x="722" y="332" class="label">LeanCLR</text>
  <text x="740" y="347" class="copy">10 篇</text>

  <!-- ===== 线 3: H5/小游戏 ===== -->
  <rect x="56" y="384" width="1088" height="72" rx="16" class="band"/>
  <text x="80" y="413" class="line-label">线 3：H5 / 小游戏</text>
  <text x="80" y="431" class="copy">WebAssembly / 小游戏开发者</text>

  <rect x="360" y="394" width="100" height="48" rx="14" class="box box-a"/>
  <text x="374" y="420" class="label">F1 调研</text>
  <text x="374" y="435" class="copy">架构总览</text>

  <path d="M460 418H490" class="line"/>

  <rect x="500" y="394" width="110" height="48" rx="14" class="box box-a"/>
  <text x="513" y="420" class="label">F9 WASM</text>
  <text x="518" y="435" class="copy">H5 构建</text>

  <path d="M610 418H640" class="line"/>

  <rect x="650" y="394" width="100" height="48" rx="14" class="box box-a"/>
  <text x="661" y="420" class="label">F10 选型</text>
  <text x="660" y="435" class="copy">vs HybridCLR</text>

  <path d="M750 418H780" class="line"/>

  <rect x="790" y="394" width="100" height="48" rx="14" class="box box-a"/>
  <text x="804" y="420" class="label">G8 体积</text>
  <text x="800" y="435" class="copy">50MB→300KB</text>

  <!-- ===== 线 4: 架构对比 ===== -->
  <rect x="56" y="472" width="1088" height="72" rx="16" class="band"/>
  <text x="80" y="501" class="line-label">线 4：架构对比</text>
  <text x="80" y="519" class="copy">做技术选型的人</text>

  <rect x="360" y="482" width="260" height="48" rx="14" class="box box-b"/>
  <text x="398" y="508" class="label">横切对比 G1 ~ G9</text>
  <text x="410" y="523" class="copy">9 篇 · 5 个 runtime 同维度对比</text>

  <!-- Caption -->
  <text x="60" y="580" class="caption">按角色选线 1~4 进入。按专题（GC / 泛型 / 执行引擎 / 热更新）深入见下方表格。</text>
  <text x="60" y="598" class="caption">所有线共享 ECMA-335 基础层。</text>
</svg>
