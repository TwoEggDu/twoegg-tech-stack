<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF4EB"/>
      <stop offset="1" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#5D645F"/>
    </marker>
    <style>
      .title { font: 700 32px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .subtitle { font: 600 14px "IBM Plex Sans", "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #7F3420; }
      .line-label { font: 700 18px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #7F3420; }
      .line-desc { font: 400 14px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .label { font: 700 20px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .copy { font: 400 14px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .caption { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .box { stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-a { fill: #FBE8D9; }
      .box-b { fill: #E5F1EE; }
      .box-c { fill: #E8EEF7; }
      .box-root { fill: #FFFBF4; stroke: rgba(20,33,31,0.18); stroke-width: 2; }
      .line { stroke: #5D645F; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .band { fill: rgba(255,255,255,0.35); stroke: rgba(20,33,31,0.06); stroke-width: 1; }
      .divider { stroke: rgba(20,33,31,0.08); stroke-width: 1; stroke-dasharray: 6,4; }
    </style>
  </defs>

  <rect width="1200" height="680" rx="28" fill="url(#bg)"/>

  <text x="60" y="50" class="subtitle">EIGHT READING PATHS</text>
  <text x="60" y="88" class="title">八条阅读线</text>

  <!-- ECMA-335 Root — 居中大盒子 -->
  <rect x="360" y="112" width="480" height="58" rx="20" class="box box-root"/>
  <text x="480" y="143" class="label">ECMA-335 基础层</text>
  <text x="510" y="161" class="copy">8 篇 · 所有线的公共入口</text>

  <!-- 从 ECMA 向下 -->
  <path d="M600 170V200" class="line"/>
  <line x1="60" y1="205" x2="1140" y2="205" class="divider"/>

  <!-- ===== 线 1: Unity 工程师 ===== -->
  <rect x="50" y="220" width="1100" height="86" rx="18" class="band"/>
  <text x="80" y="254" class="line-label">线 1：Unity 工程师</text>
  <text x="80" y="276" class="line-desc">做热更新的人</text>

  <rect x="320" y="234" width="200" height="56" rx="16" class="box box-b"/>
  <text x="365" y="264" class="label">IL2CPP</text>
  <text x="380" y="282" class="copy">8 篇 · AOT 管线</text>

  <path d="M520 262H570" class="line"/>

  <rect x="580" y="234" width="280" height="56" rx="16" class="box box-b"/>
  <text x="645" y="264" class="label">HybridCLR</text>
  <text x="640" y="282" class="copy">37 篇 · 热更补丁全链路</text>

  <!-- ===== 线 2: Runtime 工程师 ===== -->
  <rect x="50" y="322" width="1100" height="86" rx="18" class="band"/>
  <text x="80" y="356" class="line-label">线 2：Runtime 工程师</text>
  <text x="80" y="378" class="line-desc">想理解 CLR 实现的人</text>

  <rect x="320" y="336" width="180" height="56" rx="16" class="box box-c"/>
  <text x="360" y="366" class="label">CoreCLR</text>
  <text x="362" y="384" class="copy">10 篇 · JIT 标杆</text>

  <path d="M500 364H540" class="line"/>

  <rect x="550" y="336" width="150" height="56" rx="16" class="box box-c"/>
  <text x="593" y="366" class="label">Mono</text>
  <text x="577" y="384" class="copy">8 篇 · Unity 初代</text>

  <path d="M700 364H740" class="line"/>

  <rect x="750" y="336" width="200" height="56" rx="16" class="box box-c"/>
  <text x="798" y="366" class="label">LeanCLR</text>
  <text x="785" y="384" class="copy">10 篇 · 600KB 独立 CLR</text>

  <!-- ===== 线 3: H5/小游戏 ===== -->
  <rect x="50" y="424" width="1100" height="86" rx="18" class="band"/>
  <text x="80" y="458" class="line-label">线 3：H5 / 小游戏</text>
  <text x="80" y="480" class="line-desc">WebAssembly / 小游戏开发者</text>

  <rect x="320" y="438" width="140" height="56" rx="16" class="box box-a"/>
  <text x="342" y="468" class="label">F1 调研</text>
  <text x="342" y="486" class="copy">架构总览</text>

  <path d="M460 466H490" class="line"/>

  <rect x="500" y="438" width="150" height="56" rx="16" class="box box-a"/>
  <text x="522" y="468" class="label">F9 WASM</text>
  <text x="527" y="486" class="copy">H5 构建链路</text>

  <path d="M650 466H680" class="line"/>

  <rect x="690" y="438" width="140" height="56" rx="16" class="box box-a"/>
  <text x="710" y="468" class="label">F10 选型</text>
  <text x="707" y="486" class="copy">vs HybridCLR</text>

  <path d="M830 466H860" class="line"/>

  <rect x="870" y="438" width="140" height="56" rx="16" class="box box-a"/>
  <text x="893" y="468" class="label">G8 体积</text>
  <text x="880" y="486" class="copy">50MB → 300KB</text>

  <!-- ===== 线 4: 架构对比 ===== -->
  <rect x="50" y="526" width="1100" height="86" rx="18" class="band"/>
  <text x="80" y="560" class="line-label">线 4：架构对比</text>
  <text x="80" y="582" class="line-desc">做技术选型的人</text>

  <rect x="320" y="540" width="380" height="56" rx="16" class="box box-b"/>
  <text x="405" y="570" class="label">横切对比 G1 ~ G9</text>
  <text x="395" y="588" class="copy">9 篇 · 5 个 runtime 同维度对比</text>

  <!-- Caption -->
  <text x="60" y="646" class="caption">按角色选线 1~4 进入。按专题（GC / 泛型 / 执行引擎 / 热更新）深入见下方表格。所有线共享 ECMA-335 基础层。</text>
</svg>
