<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF4EB"/>
      <stop offset="1" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#5D645F"/>
    </marker>
    <style>
      .title { font: 700 30px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .subtitle { font: 600 14px "IBM Plex Sans", "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #7F3420; }
      .label { font: 700 18px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .copy { font: 400 14px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .caption { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .box { stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-a { fill: #FBE8D9; }
      .box-b { fill: #E5F1EE; }
      .box-c { fill: #E8EEF7; }
      .line { stroke: #5D645F; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .line-plain { stroke: #5D645F; stroke-width: 2.5; fill: none; }
      .band { fill: rgba(255,255,255,0.35); stroke: rgba(20,33,31,0.08); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1200" height="480" rx="28" fill="url(#bg)"/>
  <text x="64" y="52" class="subtitle">FOUR READING PATHS</text>
  <text x="64" y="88" class="title">四条阅读线</text>

  <!-- ECMA-335 central box at top -->
  <rect x="420" y="108" width="360" height="52" rx="18" class="box box-a"/>
  <text x="490" y="138" class="label">ECMA-335 基础层</text>
  <text x="510" y="154" class="copy">7 篇 · 所有线的公共入口</text>

  <!-- Trunk line down from ECMA box -->
  <path d="M600 160V185" class="line-plain"/>

  <!-- Horizontal spine at y=185, spanning from line1 to line4 -->
  <path d="M140 185H900" class="line-plain"/>

  <!-- Four vertical drops from spine to each row -->
  <path d="M140 185V218" class="line"/>
  <path d="M340 185V306" class="line"/>
  <path d="M660 185V218" class="line"/>
  <path d="M900 185V306" class="line"/>

  <!-- Row 1 band (lines 1 & 3) -->
  <rect x="40" y="218" width="1120" height="76" rx="22" class="band"/>

  <!-- Line 1: Unity engineer -->
  <text x="66" y="244" class="subtitle">线 1：Unity 工程师</text>
  <rect x="66" y="252" width="130" height="34" rx="14" class="box box-b"/>
  <text x="95" y="274" class="label">IL2CPP</text>
  <text x="148" y="274" class="copy">8篇</text>

  <path d="M196 269H236" class="line"/>

  <rect x="236" y="252" width="180" height="34" rx="14" class="box box-b"/>
  <text x="264" y="274" class="label">HybridCLR</text>
  <text x="365" y="274" class="copy">37篇</text>

  <!-- Line 3: H5/mini game -->
  <text x="586" y="244" class="subtitle">线 3：H5/小游戏</text>
  <rect x="586" y="252" width="80" height="34" rx="14" class="box box-c"/>
  <text x="610" y="274" class="label">F1</text>
  <text x="632" y="274" class="copy">调研</text>

  <path d="M666 269H696" class="line"/>

  <rect x="696" y="252" width="80" height="34" rx="14" class="box box-c"/>
  <text x="720" y="274" class="label">F9</text>

  <path d="M776 269H806" class="line"/>

  <rect x="806" y="252" width="90" height="34" rx="14" class="box box-c"/>
  <text x="830" y="274" class="label">F10</text>

  <path d="M896 269H926" class="line"/>

  <rect x="926" y="252" width="110" height="34" rx="14" class="box box-c"/>
  <text x="950" y="274" class="label">G8</text>
  <text x="984" y="274" class="copy">体积</text>

  <!-- Row 2 band (lines 2 & 4) -->
  <rect x="40" y="306" width="1120" height="76" rx="22" class="band"/>

  <!-- Line 2: Runtime engineer -->
  <text x="66" y="332" class="subtitle">线 2：Runtime 工程师</text>
  <rect x="66" y="340" width="140" height="34" rx="14" class="box box-b"/>
  <text x="90" y="362" class="label">CoreCLR</text>
  <text x="155" y="362" class="copy">10篇</text>

  <path d="M206 357H246" class="line"/>

  <rect x="246" y="340" width="110" height="34" rx="14" class="box box-b"/>
  <text x="275" y="362" class="label">Mono</text>
  <text x="318" y="362" class="copy">6篇</text>

  <path d="M356 357H396" class="line"/>

  <rect x="396" y="340" width="150" height="34" rx="14" class="box box-b"/>
  <text x="420" y="362" class="label">LeanCLR</text>
  <text x="495" y="362" class="copy">10篇</text>

  <!-- Line 4: Architecture comparison -->
  <text x="636" y="332" class="subtitle">线 4：架构对比</text>
  <rect x="636" y="340" width="290" height="34" rx="14" class="box box-c"/>
  <text x="670" y="362" class="label">横切对比 G1~G8</text>
  <text x="876" y="362" class="copy">8篇</text>

  <!-- Caption -->
  <text x="64" y="460" class="caption">所有线共享 ECMA-335 基础层。根据角色选一条线进入。</text>
</svg>
