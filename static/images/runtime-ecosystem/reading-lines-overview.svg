<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF4EB"/>
      <stop offset="1" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14Z" fill="#5D645F"/>
    </marker>
    <style>
      .title { font: 700 36px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .subtitle { font: 600 16px "IBM Plex Sans", "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #7F3420; }
      .line-label { font: 700 22px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #7F3420; }
      .line-desc { font: 400 16px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .label { font: 700 24px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .copy { font: 400 16px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .caption { font: 400 15px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .box { stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-a { fill: #FBE8D9; }
      .box-b { fill: #E5F1EE; }
      .box-c { fill: #E8EEF7; }
      .box-root { fill: #FFFBF4; stroke: rgba(20,33,31,0.18); stroke-width: 2; }
      .line { stroke: #5D645F; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .band { fill: rgba(255,255,255,0.35); stroke: rgba(20,33,31,0.06); stroke-width: 1; }
      .divider { stroke: rgba(20,33,31,0.08); stroke-width: 1; stroke-dasharray: 6,4; }
    </style>
  </defs>

  <rect width="1200" height="820" rx="28" fill="url(#bg)"/>

  <text x="50" y="55" class="subtitle">EIGHT READING PATHS</text>
  <text x="50" y="98" class="title">八条阅读线</text>

  <!-- ECMA-335 Root — 居中 -->
  <rect x="200" y="125" width="800" height="66" rx="22" class="box box-root"/>
  <text x="460" y="161" class="label">ECMA-335 基础层</text>
  <text x="490" y="182" class="copy">8 篇 · 所有线的公共入口</text>

  <path d="M600 191V226" class="line"/>
  <line x1="30" y1="232" x2="1170" y2="232" class="divider"/>

  <!-- ===== 线 1: Unity 工程师 ===== -->
  <rect x="25" y="250" width="1150" height="105" rx="20" class="band"/>
  <text x="55" y="290" class="line-label">线 1：Unity 工程师</text>
  <text x="55" y="316" class="line-desc">做热更新的人</text>

  <rect x="260" y="267" width="280" height="68" rx="18" class="box box-b"/>
  <text x="345" y="303" class="label">IL2CPP</text>
  <text x="320" y="325" class="copy">8 篇 · AOT 转换管线</text>

  <path d="M540 301H590" class="line"/>

  <rect x="600" y="267" width="480" height="68" rx="18" class="box box-b"/>
  <text x="760" y="303" class="label">HybridCLR</text>
  <text x="720" y="325" class="copy">37 篇 · 热更新补丁全链路</text>

  <!-- ===== 线 2: Runtime 工程师 ===== -->
  <rect x="25" y="373" width="1150" height="105" rx="20" class="band"/>
  <text x="55" y="413" class="line-label">线 2：Runtime 工程师</text>
  <text x="55" y="439" class="line-desc">想理解 CLR 实现的人</text>

  <rect x="260" y="390" width="240" height="68" rx="18" class="box box-c"/>
  <text x="325" y="426" class="label">CoreCLR</text>
  <text x="310" y="448" class="copy">10 篇 · JIT 标杆实现</text>

  <path d="M500 424H540" class="line"/>

  <rect x="550" y="390" width="210" height="68" rx="18" class="box box-c"/>
  <text x="618" y="426" class="label">Mono</text>
  <text x="590" y="448" class="copy">8 篇 · Unity 初代 runtime</text>

  <path d="M760 424H800" class="line"/>

  <rect x="810" y="390" width="270" height="68" rx="18" class="box box-c"/>
  <text x="892" y="426" class="label">LeanCLR</text>
  <text x="860" y="448" class="copy">10 篇 · 600KB 独立 CLR</text>

  <!-- ===== 线 3: H5/小游戏 ===== -->
  <rect x="25" y="496" width="1150" height="105" rx="20" class="band"/>
  <text x="55" y="536" class="line-label">线 3：H5 / 小游戏</text>
  <text x="55" y="562" class="line-desc">WebAssembly / 小游戏开发者</text>

  <rect x="260" y="513" width="170" height="68" rx="18" class="box box-a"/>
  <text x="293" y="549" class="label">F1 调研</text>
  <text x="296" y="571" class="copy">架构总览</text>

  <path d="M430 547H465" class="line"/>

  <rect x="475" y="513" width="190" height="68" rx="18" class="box box-a"/>
  <text x="512" y="549" class="label">F9 WASM</text>
  <text x="506" y="571" class="copy">H5 构建链路</text>

  <path d="M665 547H700" class="line"/>

  <rect x="710" y="513" width="170" height="68" rx="18" class="box box-a"/>
  <text x="742" y="549" class="label">F10 选型</text>
  <text x="730" y="571" class="copy">vs HybridCLR</text>

  <path d="M880 547H915" class="line"/>

  <rect x="925" y="513" width="180" height="68" rx="18" class="box box-a"/>
  <text x="960" y="549" class="label">G8 体积</text>
  <text x="940" y="571" class="copy">50MB → 300KB</text>

  <!-- ===== 线 4: 架构对比 ===== -->
  <rect x="25" y="619" width="1150" height="105" rx="20" class="band"/>
  <text x="55" y="659" class="line-label">线 4：架构对比</text>
  <text x="55" y="685" class="line-desc">做技术选型的人</text>

  <rect x="260" y="636" width="560" height="68" rx="18" class="box box-b"/>
  <text x="430" y="672" class="label">横切对比 G1 ~ G9</text>
  <text x="395" y="694" class="copy">9 篇 · 5 个 runtime 同维度对比</text>

  <!-- Caption -->
  <text x="50" y="775" class="caption">按角色选线 1~4 进入。按专题（GC / 泛型 / 执行引擎 / 热更新）深入见下方表格。</text>
  <text x="50" y="798" class="caption">所有线共享 ECMA-335 基础层。</text>
</svg>
