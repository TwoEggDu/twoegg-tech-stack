<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="450" viewBox="0 0 1200 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF4EB"/>
      <stop offset="1" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#5D645F"/>
    </marker>
    <style>
      .title { font: 700 30px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .subtitle { font: 600 14px "IBM Plex Sans", "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #7F3420; }
      .label { font: 700 18px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .copy { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .caption { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .box { stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-a { fill: #FBE8D9; }
      .box-b { fill: #E5F1EE; }
      .box-c { fill: #E8EEF7; }
      .line { stroke: #5D645F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="450" rx="28" fill="url(#bg)"/>
  <text x="64" y="52" class="subtitle">SHARING VS SPECIALIZATION VS FGS</text>
  <text x="64" y="88" class="title">泛型实现策略对比</text>

  <!-- Column 1: CoreCLR -->
  <rect x="44" y="120" width="208" height="48" rx="14" class="box box-b"/>
  <text x="108" y="150" class="label" text-anchor="middle">CoreCLR</text>

  <line x1="148" y1="168" x2="148" y2="196" class="line"/>
  <rect x="44" y="196" width="208" height="42" rx="12" class="box box-b"/>
  <text x="148" y="223" class="copy" text-anchor="middle">JIT 按需</text>

  <line x1="148" y1="238" x2="148" y2="266" class="line"/>
  <rect x="44" y="266" width="208" height="52" rx="12" class="box box-b"/>
  <text x="148" y="289" class="copy" text-anchor="middle">ref 共享（__Canon）</text>
  <text x="148" y="307" class="copy" text-anchor="middle">+ value 独立</text>

  <!-- Column 2: Mono -->
  <rect x="275" y="120" width="208" height="48" rx="14" class="box box-b"/>
  <text x="339" y="150" class="label" text-anchor="middle">Mono</text>

  <line x1="379" y1="168" x2="379" y2="196" class="line"/>
  <rect x="275" y="196" width="208" height="42" rx="12" class="box box-b"/>
  <text x="379" y="223" class="copy" text-anchor="middle">JIT / AOT</text>

  <line x1="379" y1="238" x2="379" y2="266" class="line"/>
  <rect x="275" y="266" width="208" height="52" rx="12" class="box box-b"/>
  <text x="379" y="289" class="copy" text-anchor="middle">ref 共享</text>
  <text x="379" y="307" class="copy" text-anchor="middle">+ Full AOT 需预声明</text>

  <!-- Column 3: IL2CPP -->
  <rect x="506" y="120" width="208" height="48" rx="14" class="box box-c"/>
  <text x="570" y="150" class="label" text-anchor="middle">IL2CPP</text>

  <line x1="610" y1="168" x2="610" y2="196" class="line"/>
  <rect x="506" y="196" width="208" height="42" rx="12" class="box box-c"/>
  <text x="610" y="223" class="copy" text-anchor="middle">构建时静态</text>

  <line x1="610" y1="238" x2="610" y2="266" class="line"/>
  <rect x="506" y="266" width="208" height="52" rx="12" class="box box-c"/>
  <text x="610" y="289" class="copy" text-anchor="middle">ref 共享</text>
  <text x="610" y="307" class="copy" text-anchor="middle">+ FGS（Unity 2021+）</text>

  <!-- Column 4: HybridCLR -->
  <rect x="737" y="120" width="208" height="48" rx="14" class="box box-c"/>
  <text x="801" y="150" class="label" text-anchor="middle">HybridCLR</text>

  <line x1="841" y1="168" x2="841" y2="196" class="line"/>
  <rect x="737" y="196" width="208" height="42" rx="12" class="box box-c"/>
  <text x="841" y="223" class="copy" text-anchor="middle">补 metadata</text>

  <line x1="841" y1="238" x2="841" y2="266" class="line"/>
  <rect x="737" y="266" width="208" height="52" rx="12" class="box box-c"/>
  <text x="841" y="289" class="copy" text-anchor="middle">AOTGenericRef</text>
  <text x="841" y="307" class="copy" text-anchor="middle">+ DisStripCode</text>

  <!-- Column 5: LeanCLR -->
  <rect x="968" y="120" width="208" height="48" rx="14" class="box box-a"/>
  <text x="1032" y="150" class="label" text-anchor="middle">LeanCLR</text>

  <line x1="1072" y1="168" x2="1072" y2="196" class="line"/>
  <rect x="968" y="196" width="208" height="42" rx="12" class="box box-a"/>
  <text x="1072" y="223" class="copy" text-anchor="middle">运行时 inflate</text>

  <line x1="1072" y1="238" x2="1072" y2="266" class="line"/>
  <rect x="968" y="266" width="208" height="52" rx="12" class="box box-a"/>
  <text x="1072" y="289" class="copy" text-anchor="middle">RtGenericClass</text>
  <text x="1072" y="307" class="copy" text-anchor="middle">按需膨胀</text>

  <!-- Caption -->
  <text x="64" y="370" class="caption">JIT runtime 不存在"构建时没见过"的问题。AOT runtime 必须在构建时预见所有泛型实例</text>
  <text x="64" y="390" class="caption">——这是 FGS 和 HybridCLR 的存在理由。</text>
</svg>