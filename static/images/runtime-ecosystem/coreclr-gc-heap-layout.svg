<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF4EB"/>
      <stop offset="1" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#5D645F"/>
    </marker>
    <style>
      .title { font: 700 30px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .subtitle { font: 600 14px "IBM Plex Sans", "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #7F3420; }
      .label { font: 700 18px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .copy { font: 400 14px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .caption { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .gen-label { font: 700 22px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .box { stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-a { fill: #FBE8D9; }
      .box-b { fill: #E5F1EE; }
      .box-c { fill: #E8EEF7; }
      .line { stroke: #5D645F; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .line-plain { stroke: #5D645F; stroke-width: 2; fill: none; stroke-dasharray: 6 4; }
      .band { fill: rgba(255,255,255,0.35); stroke: rgba(20,33,31,0.08); stroke-width: 1; }
      .divider { stroke: rgba(20,33,31,0.15); stroke-width: 1; stroke-dasharray: 4 3; }
    </style>
  </defs>

  <rect width="1200" height="400" rx="28" fill="url(#bg)"/>
  <text x="64" y="52" class="subtitle">GENERATIONAL HEAP STRUCTURE</text>
  <text x="64" y="88" class="title">CoreCLR GC 堆布局</text>

  <!-- Main heap band -->
  <rect x="40" y="108" width="1120" height="160" rx="22" class="band"/>

  <!-- Generational heap label -->
  <text x="66" y="136" class="subtitle">分代堆</text>

  <!-- Separator between generational and special heaps -->
  <line x1="760" y1="118" x2="760" y2="258" class="divider"/>
  <text x="790" y="136" class="subtitle">特殊堆</text>

  <!-- Gen0 box (small) -->
  <rect x="66" y="150" width="120" height="100" rx="14" class="box box-a"/>
  <text x="96" y="192" class="gen-label">Gen0</text>

  <!-- Promotion arrow Gen0 -> Gen1 -->
  <path d="M186 200H216" class="line"/>

  <!-- Gen1 box (medium) -->
  <rect x="216" y="150" width="160" height="100" rx="14" class="box box-a"/>
  <text x="264" y="192" class="gen-label">Gen1</text>

  <!-- Promotion arrow Gen1 -> Gen2 -->
  <path d="M376 200H406" class="line"/>

  <!-- Gen2 box (large) -->
  <rect x="406" y="150" width="320" height="100" rx="14" class="box box-b"/>
  <text x="530" y="192" class="gen-label">Gen2</text>

  <!-- LOH box -->
  <rect x="790" y="150" width="160" height="100" rx="14" class="box box-c"/>
  <text x="840" y="192" class="gen-label">LOH</text>

  <!-- POH box -->
  <rect x="980" y="150" width="150" height="100" rx="14" class="box box-c"/>
  <text x="1025" y="192" class="gen-label">POH</text>

  <!-- Characteristic descriptions below each -->
  <rect x="40" y="278" width="1120" height="74" rx="22" class="band"/>

  <text x="76" y="302" class="copy">短命对象</text>
  <text x="76" y="320" class="copy">频繁 GC</text>

  <text x="250" y="302" class="copy">中间缓冲</text>
  <text x="250" y="320" class="copy">二次考察</text>

  <text x="500" y="302" class="copy">长命对象</text>
  <text x="500" y="320" class="copy">Background GC</text>

  <text x="810" y="302" class="copy">>=85KB 大对象</text>
  <text x="810" y="320" class="copy">不压缩</text>

  <text x="990" y="302" class="copy">pinned 对象</text>
  <text x="990" y="320" class="copy">集中管理</text>

  <!-- Size indicators (visual weight) -->
  <text x="100" y="238" class="copy">小</text>
  <text x="282" y="238" class="copy">中</text>
  <text x="550" y="238" class="copy">大</text>
  <text x="854" y="238" class="copy">独立</text>
  <text x="1040" y="238" class="copy">独立</text>

  <!-- Caption -->
  <text x="64" y="388" class="caption">Gen0 最小最快，Gen2 最大最慢。LOH 和 POH 独立于分代体系。</text>
</svg>