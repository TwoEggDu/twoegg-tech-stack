<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3182ce"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38a169"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dd6b20"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#805ad5"/>
    </marker>
    <marker id="arrowMerge" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a0aec0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f7fafc" rx="8"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1a202c">GitFlow 分支策略</text>

  <!-- Branch labels on left -->
  <text x="44" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#3182ce">main</text>
  <text x="44" y="230" text-anchor="middle" font-size="13" font-weight="600" fill="#dd6b20">release</text>
  <text x="44" y="310" text-anchor="middle" font-size="13" font-weight="600" fill="#38a169">develop</text>
  <text x="44" y="400" text-anchor="middle" font-size="13" font-weight="600" fill="#805ad5">feature</text>

  <!-- main branch line -->
  <line x1="80" y1="100" x2="760" y2="100" stroke="#3182ce" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <!-- develop branch line -->
  <line x1="80" y1="305" x2="760" y2="305" stroke="#38a169" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Feature branch 1: from develop at x=160, merge back at x=310 -->
  <line x1="160" y1="305" x2="175" y2="390" stroke="#805ad5" stroke-width="2"/>
  <line x1="175" y1="390" x2="295" y2="390" stroke="#805ad5" stroke-width="2"/>
  <line x1="295" y1="390" x2="310" y2="305" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="235" y="415" text-anchor="middle" font-size="11" fill="#805ad5">feature/login</text>

  <!-- Feature branch 2: from develop at x=340, merge back at x=470 -->
  <line x1="340" y1="305" x2="355" y2="430" stroke="#805ad5" stroke-width="2"/>
  <line x1="355" y1="430" x2="455" y2="430" stroke="#805ad5" stroke-width="2"/>
  <line x1="455" y1="430" x2="470" y2="305" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="405" y="455" text-anchor="middle" font-size="11" fill="#805ad5">feature/shop</text>

  <!-- Release branch: from develop at x=500, merge to main at x=650 -->
  <line x1="500" y1="305" x2="510" y2="225" stroke="#dd6b20" stroke-width="2.5" stroke-dasharray="8,4"/>
  <line x1="510" y1="225" x2="640" y2="225" stroke="#dd6b20" stroke-width="2.5" stroke-dasharray="8,4"/>
  <line x1="640" y1="225" x2="650" y2="100" stroke="#dd6b20" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowOrange)"/>

  <!-- Release merge back to develop -->
  <line x1="640" y1="225" x2="660" y2="305" stroke="#a0aec0" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowMerge)"/>

  <!-- Dots on branches -->
  <!-- main dots -->
  <circle cx="80" cy="100" r="6" fill="#3182ce"/>
  <circle cx="650" cy="100" r="6" fill="#3182ce"/>
  <circle cx="760" cy="100" r="6" fill="#3182ce"/>

  <!-- develop dots -->
  <circle cx="80" cy="305" r="6" fill="#38a169"/>
  <circle cx="160" cy="305" r="5" fill="#38a169"/>
  <circle cx="310" cy="305" r="5" fill="#38a169"/>
  <circle cx="340" cy="305" r="5" fill="#38a169"/>
  <circle cx="470" cy="305" r="5" fill="#38a169"/>
  <circle cx="500" cy="305" r="5" fill="#38a169"/>
  <circle cx="660" cy="305" r="5" fill="#38a169"/>

  <!-- release dots -->
  <circle cx="510" cy="225" r="5" fill="#dd6b20"/>
  <circle cx="570" cy="225" r="4" fill="#dd6b20"/>
  <circle cx="640" cy="225" r="5" fill="#dd6b20"/>

  <!-- Tags on main -->
  <rect x="60" y="55" width="44" height="22" rx="4" fill="#bee3f8" stroke="#3182ce" stroke-width="1"/>
  <text x="82" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#2b6cb0">v1.0</text>

  <rect x="628" y="55" width="44" height="22" rx="4" fill="#bee3f8" stroke="#3182ce" stroke-width="1"/>
  <text x="650" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#2b6cb0">v1.1</text>

  <!-- Event labels -->
  <!-- Feature freeze -->
  <line x1="500" y1="280" x2="500" y2="265" stroke="#e53e3e" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="462" y="248" width="76" height="18" rx="3" fill="#fff5f5" stroke="#fc8181" stroke-width="0.8"/>
  <text x="500" y="261" text-anchor="middle" font-size="10" font-weight="600" fill="#c53030">功能冻结</text>

  <!-- Code freeze -->
  <line x1="570" y1="210" x2="570" y2="195" stroke="#e53e3e" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="532" y="178" width="76" height="18" rx="3" fill="#fff5f5" stroke="#fc8181" stroke-width="0.8"/>
  <text x="570" y="191" text-anchor="middle" font-size="10" font-weight="600" fill="#c53030">代码冻结</text>

  <!-- Release label -->
  <line x1="650" y1="118" x2="650" y2="135" stroke="#38a169" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="624" y="136" width="52" height="18" rx="3" fill="#f0fff4" stroke="#68d391" stroke-width="0.8"/>
  <text x="650" y="149" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">发布</text>

  <!-- Tag label -->
  <line x1="650" y1="77" x2="650" y2="94" stroke="#3182ce" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Legend -->
  <rect x="80" y="472" width="640" height="1" fill="#e2e8f0"/>
  <line x1="100" y1="488" x2="140" y2="488" stroke="#3182ce" stroke-width="3"/>
  <text x="148" y="492" font-size="11" fill="#4a5568">main (稳定)</text>
  <line x1="240" y1="488" x2="280" y2="488" stroke="#38a169" stroke-width="3"/>
  <text x="288" y="492" font-size="11" fill="#4a5568">develop (集成)</text>
  <line x1="400" y1="488" x2="440" y2="488" stroke="#dd6b20" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="448" y="492" font-size="11" fill="#4a5568">release (发布准备)</text>
  <line x1="580" y1="488" x2="620" y2="488" stroke="#805ad5" stroke-width="2"/>
  <text x="628" y="492" font-size="11" fill="#4a5568">feature (功能)</text>
</svg>