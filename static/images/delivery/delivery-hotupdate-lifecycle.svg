<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 5 10 L 10 0 z" fill="#4a5568"/>
    </marker>
    <marker id="arrowRight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
    <marker id="arrowLeft" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#f7fafc" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a202c">热更新全生命周期 (13 步)</text>

  <!-- Swim lane headers -->
  <rect x="30" y="48" width="260" height="32" rx="5" fill="#3182ce"/>
  <text x="160" y="69" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">构建端</text>

  <rect x="320" y="48" width="260" height="32" rx="5" fill="#718096"/>
  <text x="450" y="69" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">CDN</text>

  <rect x="610" y="48" width="260" height="32" rx="5" fill="#38a169"/>
  <text x="740" y="69" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">客户端</text>

  <!-- Swim lane dividers -->
  <line x1="305" y1="48" x2="305" y2="590" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="595" y1="48" x2="595" y2="590" stroke="#cbd5e0" stroke-width="6,3"/>

  <!-- === BUILD LANE (left) === -->

  <!-- Step 1 -->
  <rect x="60" y="95" width="200" height="42" rx="8" fill="#ebf8ff" stroke="#3182ce" stroke-width="1.5"/>
  <text x="160" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="#2b6cb0">1. 构建 Bundle</text>
  <text x="160" y="128" text-anchor="middle" font-size="10" fill="#4a5568">打包资源 + 代码</text>

  <!-- Arrow 1->2 -->
  <line x1="160" y1="137" x2="160" y2="153" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Step 2 -->
  <rect x="60" y="158" width="200" height="42" rx="8" fill="#ebf8ff" stroke="#3182ce" stroke-width="1.5"/>
  <text x="160" y="176" text-anchor="middle" font-size="11" font-weight="600" fill="#2b6cb0">2. 生成 Manifest</text>
  <text x="160" y="191" text-anchor="middle" font-size="10" fill="#4a5568">文件名 + 版本 + Hash</text>

  <!-- Arrow 2->3 -->
  <line x1="160" y1="200" x2="160" y2="216" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Step 3 -->
  <rect x="60" y="221" width="200" height="42" rx="8" fill="#ebf8ff" stroke="#3182ce" stroke-width="1.5"/>
  <text x="160" y="239" text-anchor="middle" font-size="11" font-weight="600" fill="#2b6cb0">3. 计算差异包</text>
  <text x="160" y="254" text-anchor="middle" font-size="10" fill="#4a5568">Diff 新旧版本</text>

  <!-- Arrow 3 -> CDN step 4 -->
  <line x1="260" y1="242" x2="340" y2="108" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowRight)"/>

  <!-- === CDN LANE (middle) === -->

  <!-- Step 4 -->
  <rect x="350" y="95" width="200" height="42" rx="8" fill="#edf2f7" stroke="#718096" stroke-width="1.5"/>
  <text x="450" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="#4a5568">4. 部署 Bundle 到 CDN</text>
  <text x="450" y="128" text-anchor="middle" font-size="10" fill="#718096">上传文件 + 设缓存</text>

  <!-- Arrow 4->5 -->
  <line x1="450" y1="137" x2="450" y2="153" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Step 5 -->
  <rect x="350" y="158" width="200" height="42" rx="8" fill="#edf2f7" stroke="#718096" stroke-width="1.5"/>
  <text x="450" y="176" text-anchor="middle" font-size="11" font-weight="600" fill="#4a5568">5. 校验 CDN 文件</text>
  <text x="450" y="191" text-anchor="middle" font-size="10" fill="#718096">Hash 比对 + 可达性</text>

  <!-- Arrow 5->6 -->
  <line x1="450" y1="200" x2="450" y2="216" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Step 6 -->
  <rect x="350" y="221" width="200" height="42" rx="8" fill="#edf2f7" stroke="#718096" stroke-width="1.5"/>
  <text x="450" y="239" text-anchor="middle" font-size="11" font-weight="600" fill="#4a5568">6. 部署 Manifest</text>
  <text x="450" y="254" text-anchor="middle" font-size="10" fill="#718096">版本号对外可见</text>

  <!-- Arrow CDN 6 -> Client 7 -->
  <line x1="550" y1="242" x2="630" y2="108" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowRight)"/>

  <!-- === CLIENT LANE (right) === -->

  <!-- Step 7 -->
  <rect x="640" y="95" width="220" height="38" rx="8" fill="#f0fff4" stroke="#38a169" stroke-width="1.5"/>
  <text x="750" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#276749">7. 检查版本号</text>

  <!-- Arrow 7 -> Decision 1 -->
  <line x1="750" y1="133" x2="750" y2="148" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Decision: 有更新? -->
  <polygon points="750,153 800,175 750,197 700,175" fill="#fffff0" stroke="#d69e2e" stroke-width="1.5"/>
  <text x="750" y="179" text-anchor="middle" font-size="10" font-weight="600" fill="#744210">有更新?</text>

  <!-- No branch -->
  <line x1="800" y1="175" x2="840" y2="175" stroke="#e53e3e" stroke-width="1.2"/>
  <text x="855" y="179" text-anchor="middle" font-size="10" fill="#e53e3e">否</text>
  <rect x="838" y="165" width="36" height="20" rx="4" fill="#fff5f5" stroke="#fc8181" stroke-width="1"/>
  <text x="856" y="179" text-anchor="middle" font-size="9" fill="#c53030">结束</text>

  <!-- Yes branch -->
  <line x1="750" y1="197" x2="750" y2="212" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="766" y="207" font-size="9" fill="#38a169">是</text>

  <!-- Step 8 -->
  <rect x="640" y="217" width="220" height="34" rx="8" fill="#f0fff4" stroke="#38a169" stroke-width="1.5"/>
  <text x="750" y="238" text-anchor="middle" font-size="11" font-weight="600" fill="#276749">8. 对比 Manifest</text>

  <!-- Arrow 8->9 -->
  <line x1="750" y1="251" x2="750" y2="264" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Step 9 -->
  <rect x="640" y="269" width="220" height="34" rx="8" fill="#f0fff4" stroke="#38a169" stroke-width="1.5"/>
  <text x="750" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#276749">9. 下载差异文件</text>

  <!-- Arrow 9->10 -->
  <line x1="750" y1="303" x2="750" y2="316" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Step 10 -->
  <rect x="640" y="321" width="220" height="34" rx="8" fill="#f0fff4" stroke="#38a169" stroke-width="1.5"/>
  <text x="750" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#276749">10. 校验 Hash</text>

  <!-- Arrow 10 -> Decision 2 -->
  <line x1="750" y1="355" x2="750" y2="370" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Decision: 校验通过? -->
  <polygon points="750,375 806,397 750,419 694,397" fill="#fffff0" stroke="#d69e2e" stroke-width="1.5"/>
  <text x="750" y="394" text-anchor="middle" font-size="9" font-weight="600" fill="#744210">校验通过?</text>
  <text x="750" y="406" text-anchor="middle" font-size="9" font-weight="600" fill="#744210"></text>

  <!-- No -> retry step 9 -->
  <line x1="694" y1="397" x2="630" y2="397" stroke="#e53e3e" stroke-width="1.2"/>
  <line x1="630" y1="397" x2="630" y2="286" stroke="#e53e3e" stroke-width="1.2"/>
  <line x1="630" y1="286" x2="640" y2="286" stroke="#e53e3e" stroke-width="1.2" marker-end="url(#arrowRight)"/>
  <text x="622" y="345" text-anchor="middle" font-size="9" fill="#e53e3e">否</text>
  <text x="622" y="356" text-anchor="middle" font-size="8" fill="#e53e3e">重试</text>

  <!-- Yes branch -->
  <line x1="750" y1="419" x2="750" y2="434" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="766" y="429" font-size="9" fill="#38a169">是</text>

  <!-- Step 11 -->
  <rect x="640" y="439" width="220" height="34" rx="8" fill="#f0fff4" stroke="#38a169" stroke-width="1.5"/>
  <text x="750" y="460" text-anchor="middle" font-size="11" font-weight="600" fill="#276749">11. 原子替换文件</text>

  <!-- Arrow 11->12 -->
  <line x1="750" y1="473" x2="750" y2="488" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Step 12 -->
  <rect x="640" y="493" width="220" height="34" rx="8" fill="#f0fff4" stroke="#38a169" stroke-width="1.5"/>
  <text x="750" y="514" text-anchor="middle" font-size="11" font-weight="600" fill="#276749">12. 更新本地 Manifest</text>

  <!-- Arrow 12->13 -->
  <line x1="750" y1="527" x2="750" y2="542" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Step 13 -->
  <rect x="640" y="547" width="220" height="38" rx="8" fill="#c6f6d5" stroke="#276749" stroke-width="2"/>
  <text x="750" y="571" text-anchor="middle" font-size="12" font-weight="700" fill="#22543d">13. 生效</text>
</svg>