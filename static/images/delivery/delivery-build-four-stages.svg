<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="stage-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="stage-shadow" x="-3%" y="-6%" width="106%" height="118%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="#fafbfc" rx="6"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">构建系统四阶段模型</text>

  <!-- Stage 1: 输入 -->
  <g filter="url(#stage-shadow)">
    <rect x="30" y="60" width="160" height="100" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="110" y="96" text-anchor="middle" font-size="22" font-weight="700" fill="#1e40af">输入</text>
    <rect x="60" y="108" width="100" height="22" rx="11" fill="#1e40af" opacity="0.15"/>
    <text x="110" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">确定性</text>
    <text x="110" y="150" text-anchor="middle" font-size="11" fill="#475569">源码 / 资源 / 配置</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="110" x2="224" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#stage-arrow)"/>

  <!-- Stage 2: 变换 -->
  <g filter="url(#stage-shadow)">
    <rect x="228" y="60" width="160" height="100" rx="12" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="308" y="96" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">变换</text>
    <rect x="258" y="108" width="100" height="22" rx="11" fill="#1e3a8a" opacity="0.15"/>
    <text x="308" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">可追溯</text>
    <text x="308" y="150" text-anchor="middle" font-size="11" fill="#475569">编译 / 打包 / 签名</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="388" y1="110" x2="422" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#stage-arrow)"/>

  <!-- Stage 3: 产物 -->
  <g filter="url(#stage-shadow)">
    <rect x="426" y="60" width="160" height="100" rx="12" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="506" y="96" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">产物</text>
    <rect x="456" y="108" width="100" height="22" rx="11" fill="#1e3a8a" opacity="0.15"/>
    <text x="506" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">可归档</text>
    <text x="506" y="150" text-anchor="middle" font-size="11" fill="#1e3a8a">.ipa / .apk / WebGL</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="586" y1="110" x2="620" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#stage-arrow)"/>

  <!-- Stage 4: 验证 -->
  <g filter="url(#stage-shadow)">
    <rect x="624" y="60" width="160" height="100" rx="12" fill="#bbf7d0" stroke="#4ade80" stroke-width="1.5"/>
    <text x="704" y="96" text-anchor="middle" font-size="22" font-weight="700" fill="#166534">验证</text>
    <rect x="654" y="108" width="100" height="22" rx="11" fill="#166534" opacity="0.15"/>
    <text x="704" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">质量门</text>
    <text x="704" y="150" text-anchor="middle" font-size="11" fill="#475569">包体 / 签名 / 启动</text>
  </g>

  <!-- Bottom detail cards -->
  <!-- Input details -->
  <rect x="30" y="190" width="160" height="80" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="212" text-anchor="middle" font-size="11" fill="#64748b">源码</text>
  <text x="110" y="228" text-anchor="middle" font-size="11" fill="#64748b">资源</text>
  <text x="110" y="244" text-anchor="middle" font-size="11" fill="#64748b">配置 + 构建参数</text>
  <line x1="110" y1="164" x2="110" y2="190" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Transform details -->
  <rect x="228" y="190" width="160" height="80" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="308" y="212" text-anchor="middle" font-size="11" fill="#64748b">编译</text>
  <text x="308" y="228" text-anchor="middle" font-size="11" fill="#64748b">打包</text>
  <text x="308" y="244" text-anchor="middle" font-size="11" fill="#64748b">签名</text>
  <line x1="308" y1="164" x2="308" y2="190" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Output details -->
  <rect x="426" y="190" width="160" height="80" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="506" y="212" text-anchor="middle" font-size="11" fill="#64748b">.ipa (iOS)</text>
  <text x="506" y="228" text-anchor="middle" font-size="11" fill="#64748b">.apk (Android)</text>
  <text x="506" y="244" text-anchor="middle" font-size="11" fill="#64748b">WebGL</text>
  <line x1="506" y1="164" x2="506" y2="190" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Verify details -->
  <rect x="624" y="190" width="160" height="80" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="704" y="212" text-anchor="middle" font-size="11" fill="#64748b">包体大小检查</text>
  <text x="704" y="228" text-anchor="middle" font-size="11" fill="#64748b">签名校验</text>
  <text x="704" y="244" text-anchor="middle" font-size="11" fill="#64748b">启动冒烟测试</text>
  <line x1="704" y1="164" x2="704" y2="190" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
</svg>