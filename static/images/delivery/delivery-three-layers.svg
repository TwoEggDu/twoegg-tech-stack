<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <filter id="layerShadow" x="-2%" y="-5%" width="104%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="#FAFBFC" rx="8"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">交付内容三层模型</text>

  <!-- Top Layer: 原理层 (Principle) - Blue -->
  <g filter="url(#layerShadow)">
    <rect x="60" y="50" width="480" height="64" rx="8" fill="#4A90D9"/>
    <text x="300" y="78" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white">原理层</text>
    <text x="300" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#D6E4F7">Principle - 为什么这样做：概念模型、设计原则、权衡取舍</text>
  </g>

  <!-- Middle Layer: 实践层 (Practice) - Green -->
  <g filter="url(#layerShadow)">
    <rect x="60" y="126" width="480" height="64" rx="8" fill="#27AE60"/>
    <text x="300" y="154" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white">实践层</text>
    <text x="300" y="176" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#D4EFDF">Practice - 怎样落地：工程规范、流程设计、团队协作方法</text>
  </g>

  <!-- Bottom Layer: 平台层 (Platform) - Orange -->
  <g filter="url(#layerShadow)">
    <rect x="60" y="202" width="480" height="64" rx="8" fill="#F5A623"/>
    <text x="300" y="230" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white">平台层</text>
    <text x="300" y="252" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#FEF3E0">Platform - 用什么工具：Unity、Jenkins、Docker、HybridCLR 等平台细节</text>
  </g>

  <!-- Side annotations -->
  <line x1="555" y1="82" x2="570" y2="82" stroke="#999" stroke-width="1"/>
  <line x1="570" y1="82" x2="570" y2="234" stroke="#999" stroke-width="1"/>
  <line x1="555" y1="234" x2="570" y2="234" stroke="#999" stroke-width="1"/>
  <text x="580" y="162" font-family="sans-serif" font-size="11" fill="#999" writing-mode="tb">自顶向下阅读</text>
</svg>