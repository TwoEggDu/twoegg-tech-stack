<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="grid-shadow" x="-1%" y="-1%" width="102%" height="102%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#fafbfc" rx="6"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">缺陷分类矩阵 (5 x 6)</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#64748b">症状维度 x 根因维度</text>

  <!-- Grid constants: startX=110, startY=76, colW=130, rowH=58 -->
  <!-- Total grid: 110 + 5*130 = 760; 76 + 7*58 = 482 -->

  <!-- Column headers (症状维度) - dark blue -->
  <rect x="110" y="76" width="130" height="48" fill="#1e3a8a"/>
  <text x="175" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">功能</text>

  <rect x="240" y="76" width="130" height="48" fill="#1e3a8a"/>
  <text x="305" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">性能</text>

  <rect x="370" y="76" width="130" height="48" fill="#1e3a8a"/>
  <text x="435" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">稳定性</text>

  <rect x="500" y="76" width="130" height="48" fill="#1e3a8a"/>
  <text x="565" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">兼容性</text>

  <rect x="630" y="76" width="130" height="48" fill="#1e3a8a"/>
  <text x="695" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">体验</text>

  <!-- Top-left corner cell -->
  <rect x="0" y="76" width="110" height="48" fill="#0f172a"/>
  <text x="55" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">症状 --></text>
  <text x="55" y="114" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">根因 ↓</text>

  <!-- Row headers (根因维度) - dark green -->
  <!-- Row 1: 内容 -->
  <rect x="0" y="124" width="110" height="58" fill="#166534"/>
  <text x="55" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">内容</text>

  <!-- Row 2: 资源 -->
  <rect x="0" y="182" width="110" height="58" fill="#15803d"/>
  <text x="55" y="218" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">资源</text>

  <!-- Row 3: 配置 -->
  <rect x="0" y="240" width="110" height="58" fill="#166534"/>
  <text x="55" y="276" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">配置</text>

  <!-- Row 4: 代码 -->
  <rect x="0" y="298" width="110" height="58" fill="#15803d"/>
  <text x="55" y="334" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">代码</text>

  <!-- Row 5: 平台 -->
  <rect x="0" y="356" width="110" height="58" fill="#166534"/>
  <text x="55" y="392" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">平台</text>

  <!-- Row 6: 基础设施 -->
  <rect x="0" y="414" width="110" height="58" fill="#15803d"/>
  <text x="55" y="450" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">基础设施</text>

  <!-- Data cells - Row 1: 内容 (light bg) -->
  <rect x="110" y="124" width="130" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="175" y="158" text-anchor="middle" font-size="13" fill="#334155">关卡缺失</text>

  <rect x="240" y="124" width="130" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="305" y="158" text-anchor="middle" font-size="13" fill="#334155">贴图过大</text>

  <rect x="370" y="124" width="130" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="435" y="158" text-anchor="middle" font-size="13" fill="#334155">引用断裂</text>

  <rect x="500" y="124" width="130" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="565" y="158" text-anchor="middle" font-size="13" fill="#334155">分辨率不适配</text>

  <rect x="630" y="124" width="130" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="695" y="158" text-anchor="middle" font-size="13" fill="#334155">文案错误</text>

  <!-- Data cells - Row 2: 资源 (slightly darker bg) -->
  <rect x="110" y="182" width="130" height="58" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="175" y="216" text-anchor="middle" font-size="13" fill="#334155">模型丢失</text>

  <rect x="240" y="182" width="130" height="58" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="305" y="216" text-anchor="middle" font-size="13" fill="#334155">未压缩</text>

  <rect x="370" y="182" width="130" height="58" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="435" y="216" text-anchor="middle" font-size="13" fill="#334155">格式错误</text>

  <rect x="500" y="182" width="130" height="58" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="565" y="216" text-anchor="middle" font-size="13" fill="#334155">压缩不支持</text>

  <rect x="630" y="182" width="130" height="58" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="695" y="216" text-anchor="middle" font-size="13" fill="#334155">画质模糊</text>

  <!-- Data cells - Row 3: 配置 (light bg) -->
  <rect x="110" y="240" width="130" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="175" y="274" text-anchor="middle" font-size="13" fill="#334155">数值错误</text>

  <rect x="240" y="240" width="130" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="305" y="274" text-anchor="middle" font-size="13" fill="#334155">参数失控</text>

  <rect x="370" y="240" width="130" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="435" y="274" text-anchor="middle" font-size="13" fill="#334155">类型不匹配</text>

  <rect x="500" y="240" width="130" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="565" y="274" text-anchor="middle" font-size="13" fill="#334155">分档缺失</text>

  <rect x="630" y="240" width="130" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="695" y="274" text-anchor="middle" font-size="13" fill="#334155">难度失衡</text>

  <!-- Data cells - Row 4: 代码 (slightly darker bg) -->
  <rect x="110" y="298" width="130" height="58" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="175" y="332" text-anchor="middle" font-size="13" fill="#334155">逻辑Bug</text>

  <rect x="240" y="298" width="130" height="58" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="305" y="332" text-anchor="middle" font-size="13" fill="#334155">GC爆炸</text>

  <rect x="370" y="298" width="130" height="58" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="435" y="332" text-anchor="middle" font-size="13" fill="#334155">空引用</text>

  <rect x="500" y="298" width="130" height="58" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="565" y="332" text-anchor="middle" font-size="13" fill="#334155">API版本</text>

  <rect x="630" y="298" width="130" height="58" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="695" y="332" text-anchor="middle" font-size="13" fill="#334155">响应迟钝</text>

  <!-- Data cells - Row 5: 平台 (light bg) -->
  <rect x="110" y="356" width="130" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="175" y="390" text-anchor="middle" font-size="13" fill="#334155">API不兼容</text>

  <rect x="240" y="356" width="130" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="305" y="390" text-anchor="middle" font-size="13" fill="#334155">驱动差异</text>

  <rect x="370" y="356" width="130" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="435" y="390" text-anchor="middle" font-size="13" fill="#334155">OOM差异</text>

  <rect x="500" y="356" width="130" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="565" y="390" text-anchor="middle" font-size="13" fill="#334155">GPU差异</text>

  <rect x="630" y="356" width="130" height="58" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="695" y="390" text-anchor="middle" font-size="13" fill="#334155">交互差异</text>

  <!-- Data cells - Row 6: 基础设施 (slightly darker bg) -->
  <rect x="110" y="414" width="130" height="58" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="175" y="448" text-anchor="middle" font-size="13" fill="#334155">CDN异常</text>

  <rect x="240" y="414" width="130" height="58" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="305" y="448" text-anchor="middle" font-size="13" fill="#334155">带宽不足</text>

  <rect x="370" y="414" width="130" height="58" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="435" y="448" text-anchor="middle" font-size="13" fill="#334155">服务宕机</text>

  <rect x="500" y="414" width="130" height="58" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="565" y="448" text-anchor="middle" font-size="13" fill="#334155">网络限制</text>

  <rect x="630" y="414" width="130" height="58" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="695" y="448" text-anchor="middle" font-size="13" fill="#334155">延迟过高</text>
</svg>