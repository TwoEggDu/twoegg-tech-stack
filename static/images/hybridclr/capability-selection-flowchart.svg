<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF4EB"/>
      <stop offset="100%" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#5D645F"/>
    </marker>
    <style>
      .title { fill: #14211F; font-family: "IBM Plex Sans", "Segoe UI", sans-serif; font-weight: 700; font-size: 30px; }
      .subtitle { fill: #7F3420; font-family: "IBM Plex Sans", "Segoe UI", sans-serif; font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em; }
      .label { fill: #14211F; font-family: "IBM Plex Sans", "Segoe UI", sans-serif; font-weight: 700; font-size: 18px; }
      .copy { fill: #596563; font-family: "IBM Plex Sans", "Segoe UI", sans-serif; font-weight: 400; font-size: 14px; }
      .caption { fill: #596563; font-family: "IBM Plex Sans", "Segoe UI", sans-serif; font-weight: 400; font-size: 13px; }
      .box-a { fill: #FBE8D9; stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-b { fill: #E5F1EE; stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-c { fill: #E8EEF7; stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .band { fill: rgba(255,255,255,0.35); stroke: rgba(20,33,31,0.08); }
      .line { stroke: #5D645F; stroke-width: 2.5; fill: none; }
      .diamond { fill: #FFFFFF; stroke: rgba(20,33,31,0.18); stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>

  <!-- Title block -->
  <text x="600" y="50" text-anchor="middle" class="subtitle">WHICH ROUTE FOR WHICH GAP</text>
  <text x="600" y="88" text-anchor="middle" class="title">高级能力选型决策</text>

  <!-- Start diamond -->
  <polygon class="diamond" points="600,120 720,165 600,210 480,165"/>
  <text x="600" y="162" text-anchor="middle" class="copy" font-weight="600">项目遇到了</text>
  <text x="600" y="178" text-anchor="middle" class="copy" font-weight="600">什么问题？</text>

  <!-- Branch lines from diamond -->
  <!-- Branch 1: Left-most -->
  <path class="line" d="M 480 165 L 160 165 L 160 280" marker-end="url(#arrow)"/>
  <!-- Branch 2: Center-left -->
  <path class="line" d="M 540 210 L 400 240 L 400 280" marker-end="url(#arrow)"/>
  <!-- Branch 3: Center-right -->
  <path class="line" d="M 660 210 L 760 240 L 760 280" marker-end="url(#arrow)"/>
  <!-- Branch 4: Right-most -->
  <path class="line" d="M 720 165 L 1020 165 L 1020 280" marker-end="url(#arrow)"/>

  <!-- Condition labels -->
  <rect class="band" x="70" y="230" width="180" height="36" rx="10"/>
  <text x="160" y="254" text-anchor="middle" class="copy">热更都没跑通</text>

  <rect class="band" x="305" y="245" width="190" height="36" rx="10"/>
  <text x="400" y="269" text-anchor="middle" class="copy">metadata 看不见</text>

  <rect class="band" x="660" y="245" width="200" height="36" rx="10"/>
  <text x="760" y="269" text-anchor="middle" class="copy">AOT 泛型覆盖不够</text>

  <rect class="band" x="895" y="230" width="250" height="36" rx="10"/>
  <text x="1020" y="254" text-anchor="middle" class="copy">改现有 AOT 模块又要保性能</text>

  <!-- Result boxes -->
  <!-- Branch 1 result -->
  <rect class="box-a" x="70" y="295" width="180" height="65" rx="12"/>
  <text x="160" y="328" text-anchor="middle" class="label" font-size="16">社区版主线</text>
  <text x="160" y="348" text-anchor="middle" class="copy" font-size="12">基础热更能力</text>

  <!-- Branch 2 result -->
  <rect class="box-b" x="305" y="295" width="190" height="65" rx="12"/>
  <text x="400" y="328" text-anchor="middle" class="label" font-size="16">补充 metadata</text>
  <text x="400" y="348" text-anchor="middle" class="copy" font-size="12">LoadMetadata API</text>

  <!-- Branch 3 result -->
  <rect class="box-b" x="660" y="295" width="200" height="65" rx="12"/>
  <text x="760" y="328" text-anchor="middle" class="label" font-size="16">Full Generic Sharing</text>
  <text x="760" y="348" text-anchor="middle" class="copy" font-size="12">统一泛型调用</text>

  <!-- Branch 4 result -->
  <rect class="box-c" x="895" y="295" width="250" height="65" rx="12"/>
  <text x="1020" y="328" text-anchor="middle" class="label" font-size="16">DHE（商业版）</text>
  <text x="1020" y="348" text-anchor="middle" class="copy" font-size="12">函数级 AOT + 解释混合</text>

  <!-- Progression arrow at bottom -->
  <rect class="band" x="120" y="400" width="960" height="60" rx="22"/>
  <line class="line" x1="160" y1="430" x2="1040" y2="430" marker-end="url(#arrow)"/>
  <text x="200" y="448" class="copy" font-size="12">基础</text>
  <text x="600" y="420" text-anchor="middle" class="copy" font-weight="600">能力层级渐进</text>
  <text x="1000" y="448" text-anchor="end" class="copy" font-size="12">高级</text>

  <!-- Caption -->
  <text x="600" y="510" text-anchor="middle" class="caption">先从社区版主线开始，遇到具体瓶颈再按层进阶。</text>
</svg>