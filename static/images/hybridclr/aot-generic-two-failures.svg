<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF4EB"/>
      <stop offset="1" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#5D645F"/>
    </marker>
    <style>
      .title { font: 700 30px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .subtitle { font: 600 14px "IBM Plex Sans", "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #7F3420; }
      .label { font: 700 18px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .copy { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .caption { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .box { fill: rgba(255,251,244,0.94); stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-a { fill: #FBE8D9; }
      .box-b { fill: #E5F1EE; }
      .box-c { fill: #E8EEF7; }
      .line { stroke: #5D645F; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .line-no-arrow { stroke: #5D645F; stroke-width: 2.5; fill: none; }
      .band { fill: rgba(255,255,255,0.35); stroke: rgba(20,33,31,0.08); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1200" height="580" rx="28" fill="url(#bg)"/>
  <text x="64" y="64" class="subtitle">Metadata vs Native Implementation</text>
  <text x="64" y="104" class="title">AOT 泛型的两层失败</text>

  <!-- Top entry box -->
  <rect x="380" y="140" width="440" height="52" rx="18" class="box box-a"/>
  <text x="460" y="173" class="label">热更代码调用 AOT 泛型方法</text>

  <!-- Vertical line down from entry, splitting -->
  <path d="M600 192V230" class="line-no-arrow"/>
  <path d="M600 230L340 230" class="line-no-arrow"/>
  <path d="M600 230L860 230" class="line-no-arrow"/>
  <path d="M340 230V260" class="line"/>
  <path d="M860 230V260" class="line"/>

  <!-- Left path: metadata failure -->
  <rect x="180" y="260" width="320" height="52" rx="18" class="box box-b"/>
  <text x="248" y="293" class="label">失败一：metadata 不足</text>

  <path d="M340 312V344" class="line"/>

  <rect x="180" y="344" width="320" height="52" rx="18" class="box box-b"/>
  <text x="274" y="377" class="label">runtime 看不懂</text>

  <path d="M340 396V428" class="line"/>

  <rect x="120" y="428" width="440" height="52" rx="18" class="box box-b"/>
  <text x="164" y="461" class="label">修法：LoadMetadataForAOTAssembly</text>

  <!-- Right path: AOT instance failure -->
  <rect x="700" y="260" width="320" height="52" rx="18" class="box box-c"/>
  <text x="751" y="293" class="label">失败二：AOT 实例不存在</text>

  <path d="M860 312V344" class="line"/>

  <rect x="700" y="344" width="320" height="52" rx="18" class="box box-c"/>
  <text x="764" y="377" class="label">runtime 没东西可调</text>

  <path d="M860 396V428" class="line"/>

  <rect x="620" y="428" width="460" height="52" rx="18" class="box box-c"/>
  <text x="644" y="461" class="label">修法：AOTGenericReference / DisStripCode</text>

  <!-- Bottom caption -->
  <text x="64" y="545" class="caption">补 metadata 解决左侧问题；AOTGenericReference 和 DisStripCode 解决右侧问题。两者不是一层。</text>
</svg>