<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF4EB"/>
      <stop offset="1" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#5D645F"/>
    </marker>
    <style>
      .title { font: 700 30px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .subtitle { font: 600 14px "IBM Plex Sans", "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #7F3420; }
      .label { font: 700 18px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .copy { font: 400 14px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .caption { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .box-a { fill: #FBE8D9; stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-b { fill: #E5F1EE; stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-c { fill: #E8EEF7; stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .line { stroke: #5D645F; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .band { fill: rgba(255,255,255,0.35); stroke: rgba(20,33,31,0.08); stroke-width: 1; }
      .phase-num { font: 700 14px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #7F3420; }
      .action { font: 700 15px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
    </style>
  </defs>

  <rect width="1200" height="440" rx="28" fill="url(#bg)"/>
  <text x="64" y="56" class="subtitle">AOTGENERICREFERENCES → DISSTRIPCODE → METADATA</text>
  <text x="64" y="96" class="title">三者协作因果链</text>

  <!-- Timeline band -->
  <rect x="56" y="126" width="1088" height="260" rx="22" class="band"/>

  <!-- Phase 1: AOTGenericReferences -->
  <rect x="90" y="150" width="300" height="60" rx="16" class="box-a"/>
  <text x="240" y="178" class="label" text-anchor="middle">① AOTGenericReferences</text>
  <text x="240" y="198" class="phase-num" text-anchor="middle">发现缺口</text>

  <rect x="90" y="228" width="300" height="56" rx="14" class="box-a" style="opacity:0.6"/>
  <text x="240" y="256" class="copy" text-anchor="middle">分析热更代码触发了哪些</text>
  <text x="240" y="274" class="copy" text-anchor="middle">AOT 泛型</text>

  <!-- Arrow 1→2 -->
  <path d="M390 180H450" class="line"/>

  <!-- Phase 2: DisStripCode -->
  <rect x="450" y="150" width="300" height="60" rx="16" class="box-b"/>
  <text x="600" y="178" class="label" text-anchor="middle">② DisStripCode</text>
  <text x="600" y="198" class="phase-num" text-anchor="middle">保留实例</text>

  <rect x="450" y="228" width="300" height="56" rx="14" class="box-b" style="opacity:0.6"/>
  <text x="600" y="256" class="copy" text-anchor="middle">在 AOT 编译时保留</text>
  <text x="600" y="274" class="copy" text-anchor="middle">具体泛型实例</text>

  <!-- Arrow 2→3 -->
  <path d="M750 180H810" class="line"/>

  <!-- Phase 3: 补充 metadata -->
  <rect x="810" y="150" width="300" height="60" rx="16" class="box-c"/>
  <text x="960" y="178" class="label" text-anchor="middle">③ 补充 metadata</text>
  <text x="960" y="198" class="phase-num" text-anchor="middle">加可见性</text>

  <rect x="810" y="228" width="300" height="56" rx="14" class="box-c" style="opacity:0.6"/>
  <text x="960" y="256" class="copy" text-anchor="middle">运行时让解释器能</text>
  <text x="960" y="274" class="copy" text-anchor="middle">查询 AOT metadata</text>

  <!-- Causal chain label -->
  <rect x="340" y="310" width="520" height="44" rx="14" style="fill:rgba(255,255,255,0.5); stroke:rgba(20,33,31,0.10); stroke-width:1;"/>
  <text x="600" y="338" class="action" text-anchor="middle">因果链：① 找到缺口 → ② 保留对应实例 → ③ 让运行时看得见</text>

  <text x="64" y="416" class="caption">三者是因果链，不是可替代选项。顺序不能乱。</text>
</svg>