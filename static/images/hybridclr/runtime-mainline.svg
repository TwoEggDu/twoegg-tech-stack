<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF4EB"/>
      <stop offset="1" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#5D645F"/>
    </marker>
    <style>
      .title { font: 700 30px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .subtitle { font: 600 14px "IBM Plex Sans", "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #7F3420; }
      .label { font: 700 18px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .copy { font: 400 14px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .caption { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .box { fill: rgba(255,251,244,0.92); stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-a { fill: #FBE8D9; }
      .box-b { fill: #E5F1EE; }
      .box-c { fill: #E8EEF7; }
      .line { stroke: #5D645F; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .band { fill: rgba(255,255,255,0.35); stroke: rgba(20,33,31,0.08); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>
  <text x="64" y="64" class="subtitle">HybridCLR Mainline</text>
  <text x="64" y="104" class="title">从 RuntimeApi 到 Interpreter::Execute 的主链</text>

  <rect x="56" y="136" width="1088" height="122" rx="22" class="band"/>
  <rect x="56" y="282" width="1088" height="122" rx="22" class="band"/>
  <rect x="56" y="428" width="1088" height="88" rx="22" class="band"/>

  <text x="82" y="168" class="subtitle">Build-Time Inputs</text>
  <text x="82" y="314" class="subtitle">Metadata And Method Body</text>
  <text x="82" y="460" class="subtitle">Execution</text>

  <rect x="90" y="182" width="160" height="54" rx="18" class="box box-a"/>
  <text x="115" y="214" class="label">Editor 工具链</text>
  <text x="111" y="232" class="copy">CompileDll / LinkXml / AOTDlls</text>

  <rect x="300" y="182" width="190" height="54" rx="18" class="box box-a"/>
  <text x="326" y="214" class="label">C# RuntimeApi</text>
  <text x="338" y="232" class="copy">LoadMetadata / PreJit</text>

  <rect x="540" y="182" width="200" height="54" rx="18" class="box box-b"/>
  <text x="566" y="214" class="label">native RuntimeApi</text>
  <text x="566" y="232" class="copy">internal call 入口与分发</text>

  <rect x="790" y="182" width="260" height="54" rx="18" class="box box-b"/>
  <text x="820" y="214" class="label">metadata::Assembly</text>
  <text x="822" y="232" class="copy">装载热更程序集 / 补充 AOT metadata</text>

  <path d="M250 209H300" class="line"/>
  <path d="M490 209H540" class="line"/>
  <path d="M740 209H790" class="line"/>

  <rect x="120" y="328" width="240" height="54" rx="18" class="box box-b"/>
  <text x="150" y="360" class="label">MetadataModule</text>
  <text x="147" y="378" class="copy">Image 注册、程序集映射、类型入口</text>

  <rect x="430" y="328" width="240" height="54" rx="18" class="box box-b"/>
  <text x="460" y="360" class="label">MethodBodyCache</text>
  <text x="447" y="378" class="copy">token -&gt; MethodBody / EH / locals</text>

  <rect x="740" y="328" width="280" height="54" rx="18" class="box box-c"/>
  <text x="770" y="360" class="label">HiTransform::Transform</text>
  <text x="772" y="378" class="copy">IL -&gt; InterpMethodInfo / 内部指令</text>

  <path d="M360 355H430" class="line"/>
  <path d="M670 355H740" class="line"/>

  <rect x="250" y="452" width="240" height="40" rx="16" class="box box-c"/>
  <text x="283" y="478" class="label">GetInterpMethodInfo</text>

  <rect x="570" y="452" width="280" height="40" rx="16" class="box box-c"/>
  <text x="605" y="478" class="label">Interpreter::Execute</text>

  <path d="M490 472H570" class="line"/>

  <text x="64" y="536" class="caption">关键词：HybridCLR 不是单点“解释器”，而是一条从 build-time 输入、metadata 装载、方法体解析到解释执行的完整链路。</text>
</svg>
