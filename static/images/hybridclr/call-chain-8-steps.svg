<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF4EB"/>
      <stop offset="1" stop-color="#F2E9DA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#5D645F"/>
    </marker>
    <style>
      .title { font: 700 30px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .subtitle { font: 600 14px "IBM Plex Sans", "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #7F3420; }
      .label { font: 700 17px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #14211F; }
      .copy { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .caption { font: 400 13px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #596563; }
      .box { fill: rgba(255,251,244,0.94); stroke: rgba(20,33,31,0.12); stroke-width: 1.5; }
      .box-a { fill: #FBE8D9; }
      .box-b { fill: #E5F1EE; }
      .box-c { fill: #E8EEF7; }
      .line { stroke: #5D645F; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .band { fill: rgba(255,255,255,0.35); stroke: rgba(20,33,31,0.08); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>
  <text x="64" y="64" class="subtitle">From Assembly.Load to Interpreter::Execute</text>
  <text x="64" y="104" class="title">热更方法调用链 8 步</text>

  <!-- Bands (drawn first, behind everything) -->
  <rect x="56" y="140" width="1088" height="110" rx="22" class="band"/>
  <rect x="56" y="268" width="1088" height="110" rx="22" class="band"/>
  <rect x="56" y="396" width="1088" height="110" rx="22" class="band"/>

  <!-- Band labels -->
  <text x="82" y="170" class="subtitle">装载期</text>
  <text x="82" y="298" class="subtitle">初始化期</text>
  <text x="82" y="426" class="subtitle">调用期</text>

  <!-- Band 1 boxes: steps 1-3 -->
  <rect x="90" y="186" width="200" height="46" rx="16" class="box box-a"/>
  <text x="130" y="215" class="label">Assembly.Load</text>

  <path d="M290 209H330" class="line"/>

  <rect x="330" y="186" width="200" height="46" rx="16" class="box box-a"/>
  <text x="370" y="215" class="label">MetadataCache</text>

  <path d="M530 209H570" class="line"/>

  <rect x="570" y="186" width="340" height="46" rx="16" class="box box-a"/>
  <text x="590" y="215" class="label">Assembly::Create (InterpreterImage)</text>

  <!-- Connector: band 1 last box -> band 2 box -->
  <path d="M910 209H960V337H570" class="line"/>

  <!-- Band 2 box: step 4 -->
  <rect x="90" y="314" width="480" height="46" rx="16" class="box box-b"/>
  <text x="110" y="343" class="label">Class::SetupMethods (invoker -> InterpreterInvoke)</text>

  <!-- Connector: band 2 box -> band 3 first box -->
  <path d="M90 337H70V465H90" class="line"/>

  <!-- Band 3 boxes: steps 5-8 -->
  <rect x="90" y="442" width="190" height="46" rx="16" class="box box-c"/>
  <text x="108" y="471" class="label">MethodInfo.Invoke</text>

  <path d="M280 465H320" class="line"/>

  <rect x="320" y="442" width="200" height="46" rx="16" class="box box-c"/>
  <text x="345" y="471" class="label">InterpreterInvoke</text>

  <path d="M520 465H560" class="line"/>

  <rect x="560" y="442" width="270" height="46" rx="16" class="box box-c"/>
  <text x="580" y="471" class="label">HiTransform::Transform</text>

  <path d="M830 465H870" class="line"/>

  <rect x="870" y="442" width="240" height="46" rx="16" class="box box-c"/>
  <text x="895" y="471" class="label">Interpreter::Execute</text>

  <!-- Bottom caption -->
  <text x="64" y="540" class="caption">transform 发生在第一次调用时（lazy），不是装载时。</text>
</svg>